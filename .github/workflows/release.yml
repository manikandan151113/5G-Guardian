name: Build and Upload Release Asset

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}

    - name: Sign Android Release APK
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      id: sign_app
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Determine APK Path
      id: apk_file
      run: |
        if [ -f "app/build/outputs/apk/release/app-release-signed.apk" ]; then
          echo "apk_path=app/build/outputs/apk/release/app-release-signed.apk" >> $GITHUB_OUTPUT
          echo "apk_name=5G-Guardian-${{ github.event.release.tag_name }}-signed.apk" >> $GITHUB_OUTPUT
        else
          echo "apk_path=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_OUTPUT
          echo "apk_name=5G-Guardian-${{ github.event.release.tag_name }}-unsigned.apk" >> $GITHUB_OUTPUT
        fi

    - name: Upload Release APK Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.apk_file.outputs.apk_path }}
        name: ${{ steps.apk_file.outputs.apk_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
